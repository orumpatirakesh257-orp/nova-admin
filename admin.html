<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Dine | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #FFD700; /* Gold */
            --accent-hover: #e6c200;
            --danger: #ff4d4d;
            --success: #00c853;
            --warning: #ff9100;
            --border-radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        /* Header */
        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid #333;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .brand {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .brand span {
            color: var(--text-primary);
        }

        /* Controls Section */
        .controls {
            padding: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            background-color: #181818;
            align-items: center;
            justify-content: center;
        }

        .search-box, .date-filter {
            position: relative;
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }

        input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid #444;
            background-color: var(--card-bg);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        input[type="date"] {
            color-scheme: dark;
        }

        /* Grid Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .bookings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        /* Booking Card */
        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            border: 1px solid #333;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: #444;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.8rem;
        }

        .customer-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .booking-id {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Status Badge */
        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending {
            background-color: rgba(255, 215, 0, 0.15);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .status-accepted {
            background-color: rgba(0, 200, 83, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-rejected {
            background-color: rgba(255, 77, 77, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        /* Card Details */
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .detail-item strong {
            color: var(--text-primary);
        }

        .detail-full {
            grid-column: span 2;
        }

        /* Actions */
        .actions {
            margin-top: auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-accept {
            background-color: rgba(0, 200, 83, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .btn-accept:hover {
            background-color: var(--success);
            color: #000;
        }

        .btn-reject {
            background-color: rgba(255, 77, 77, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-reject:hover {
            background-color: var(--danger);
            color: white;
        }

        .btn-delete {
            background-color: transparent;
            color: var(--text-secondary);
            border: 1px solid #444;
        }

        .btn-delete:hover {
            border-color: var(--danger);
            color: var(--danger);
            background-color: rgba(255, 77, 77, 0.05);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }

        .loader {
            border: 3px solid #333;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .bookings-grid {
                grid-template-columns: 1fr;
            }
            
            .actions {
                grid-template-columns: 1fr; 
            }
            
            .btn-accept, .btn-reject, .btn-delete {
                width: 100%;
            }
            
            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">Nova<span>Dine</span></div>
        <div style="font-size: 0.9rem; color: var(--text-secondary);">Admin Panel</div>
    </header>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Name or Phone...">
        </div>
        <div class="date-filter">
            <input type="date" id="dateFilter">
        </div>
    </div>

    <div class="container">
        <div id="bookingsGrid" class="bookings-grid">
            <!-- Loading State -->
            <div class="empty-state">
                <div class="loader"></div>
                <p>Connecting to Database...</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
     <script>
if(localStorage.getItem("adminLoggedIn") !== "true") {
    window.location.href = "nova-admin-access.html";
}
</script>
<button onclick="logout()" style="position:fixed;top:20px;right:20px;padding:10px 15px;border:none;border-radius:8px;background:#ff4d4d;color:#fff;cursor:pointer;">
Logout
</button>

<script>
function logout() {
    localStorage.removeItem("adminLoggedIn");
    window.location.href = "nova-admin-access.html";
}
</script>
    <script type="module">
        // Import Firebase functions from CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            onSnapshot, 
            query, 
            orderBy, 
            doc, 
            updateDoc, 
            deleteDoc,
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDLDqO0p-DEsw-jr7CuMzz19buR0lBE9kk",
            authDomain: "nova-dine-c7e5b.firebaseapp.com",
            projectId: "nova-dine-c7e5b",
            storageBucket: "nova-dine-c7e5b.firebasestorage.app",
            messagingSenderId: "466169992767",
            appId: "1:466169992767:web:c2a800d935e993cb014a8a"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==========================================
        // 2. STATE MANAGEMENT
        // ==========================================
        let allBookings = [];
        const bookingsGrid = document.getElementById('bookingsGrid');
        const searchInput = document.getElementById('searchInput');
        const dateFilter = document.getElementById('dateFilter');

        // ==========================================
        // 3. REAL-TIME DATA FETCHING
        // ==========================================
        function initRealTimeListener() {
            // Query: Order by creation time (descending) to show latest first
            const q = collection(db, "bookings");

            onSnapshot(q, (snapshot) => {
                allBookings = [];
                if (snapshot.empty) {
                    renderEmptyState("No bookings found.");
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    allBookings.push({
                        id: doc.id,
                        ...data,
                        // Handle potential missing createdAt or string dates gracefully
                        createdAt: data.createdAt ? data.createdAt.toDate() : new Date(),
                        dateObj: data.date // Assuming YYYY-MM-DD string
                    });
                });

                applyFiltersAndRender();
            }, (error) => {
                console.error("Error fetching bookings:", error);
                renderEmptyState("Error loading data. Check console.");
            });
        }

        // ==========================================
        // 4. FILTERING & SEARCH LOGIC
        // ==========================================
        function applyFiltersAndRender() {
            const searchTerm = searchInput.value.toLowerCase();
            const filterDate = dateFilter.value; // YYYY-MM-DD

            const filtered = allBookings.filter(booking => {
                // Search Filter (Name or Phone)
                const matchesSearch = 
                    booking.name.toLowerCase().includes(searchTerm) || 
                    booking.phone.includes(searchTerm);
                
                // Date Filter
                // Note: booking.date is string 'YYYY-MM-DD'
                const matchesDate = filterDate ? booking.date === filterDate : true;

                return matchesSearch && matchesDate;
            });

            renderBookings(filtered);
        }

        searchInput.addEventListener('input', applyFiltersAndRender);
        dateFilter.addEventListener('change', applyFiltersAndRender);

        // ==========================================
        // 5. RENDERING UI
        // ==========================================
        function renderBookings(bookings) {
            bookingsGrid.innerHTML = '';

            if (bookings.length === 0) {
                renderEmptyState("No bookings match your criteria.");
                return;
            }

            bookings.forEach(booking => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Format Date for display
                const dateDisplay = booking.date; 
                const timeDisplay = booking.time;
                const guestsDisplay = booking.guests;
                const phoneDisplay = booking.phone;
                const nameDisplay = booking.name;
                
                // Determine Status Class
                let statusClass = 'status-pending';
                let statusText = 'Pending';
                if (booking.status === 'accepted') { statusClass = 'status-accepted'; statusText = 'Accepted'; }
                if (booking.status === 'rejected') { statusClass = 'status-rejected'; statusText = 'Rejected'; }

                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="customer-name">${escapeHtml(nameDisplay)}</div>
                            <div class="booking-id">ID: ${booking.id.substring(0,8)}</div>
                        </div>
                        <span class="status ${statusClass}">${statusText}</span>
                    </div>
                    
                    <div class="details">
                        <div class="detail-item">
                            <span>📅</span> <strong>${dateDisplay}</strong>
                        </div>
                        <div class="detail-item">
                            <span>⏰</span> <strong>${timeDisplay}</strong>
                        </div>
                        <div class="detail-item">
                            <span>👥</span> <strong>${guestsDisplay} Guests</strong>
                        </div>
                        <div class="detail-item">
                            <span>📞</span> ${escapeHtml(phoneDisplay)}
                        </div>
                        <div class="detail-item detail-full" style="font-size: 0.8rem; margin-top:5px; opacity: 0.7;">
                            <span>🕒</span> Booked: ${booking.createdAt.toLocaleString()}
                        </div>
                    </div>

                    <div class="actions">
                        <button class="btn-accept" onclick="updateStatus('${booking.id}', 'accepted')">Accept</button>
                        <button class="btn-reject" onclick="updateStatus('${booking.id}', 'rejected')">Reject</button>
                        <button class="btn-delete" onclick="deleteBooking('${booking.id}')">Delete</button>
                    </div>
                `;
                bookingsGrid.appendChild(card);
            });
        }

        function renderEmptyState(message) {
            bookingsGrid.innerHTML = `
                <div class="empty-state">
                    <h3>${message}</h3>
                    <p>Try adjusting your search or filters.</p>
                </div>
            `;
        }

        // Helper to prevent XSS
        function escapeHtml(text) {
            if (!text) return text;
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // ==========================================
        // 6. ACTIONS
        // ==========================================
        
        // Expose functions to window so HTML onclick works
        window.updateStatus = async (id, status) => {
            if(!confirm(`Are you sure you want to mark this booking as ${status}?`)) return;
            
            try {
                const bookingRef = doc(db, "bookings", id);
                await updateDoc(bookingRef, {
                    status: status
                });
                // UI updates automatically via onSnapshot
            } catch (error) {
                console.error("Error updating status: ", error);
                alert("Failed to update status.");
            }
        };

        window.deleteBooking = async (id) => {
            if(!confirm("Are you sure you want to DELETE this booking? This cannot be undone.")) return;

            try {
                await deleteDoc(doc(db, "bookings", id));
                // UI updates automatically via onSnapshot
            } catch (error) {
                console.error("Error deleting booking: ", error);
                alert("Failed to delete booking.");
            }
        };

        // Initialize App
        initRealTimeListener();

    </script>
</body>
</html>
