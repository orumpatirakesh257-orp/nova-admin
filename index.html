<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Dine | Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --gold: #FFD700;
            --blue: #00D4FF;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Glows */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }

        .orb-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--blue), transparent);
            animation-delay: 0s;
        }

        .orb-2 {
            bottom: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--gold), transparent);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 50px); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo */
        .logo {
            font-size: 2rem;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            animation: fadeInDown 1s ease-out;
        }

        /* Glassmorphism Card */
        .login-card {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 1s ease-out;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .heading {
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtext {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Form Elements */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--blue), #0088cc);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            background: linear-gradient(135deg, #00e1ff, #0099cc);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            animation: fadeIn 1.5s ease-out;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }
            .logo {
                font-size: 1.5rem;
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Effects -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="container">
        <!-- Top Logo -->
        <div class="logo">NOVA DINE</div>

        <!-- Login Card -->
        <div class="login-card">
            <h2 class="heading">Admin Login</h2>
            <p class="subtext">Secure access for restaurant owner</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="password" id="passwordInput" placeholder="Enter Password" required>
                </div>
                <button type="submit" class="login-btn">Unlock Dashboard</button>
            </form>
        </div>

        <!-- Footer -->
        <div class="footer">Powered by Nivora Tech</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const passwordInput = document.getElementById('passwordInput').value;
            const correctPassword = "12345";

            if (passwordInput === correctPassword) {
                // Store login state in localStorage
                localStorage.setItem('adminLoggedIn', 'true');
                
                // Optional: Add a brief delay for visual feedback
                const btn = document.querySelector('.login-btn');
                const originalText = btn.innerText;
                btn.innerText = 'Access Granted...';
                btn.style.background = 'linear-gradient(135deg, #00ff88, #00cc66)';
                
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 800);
            } else {
                // Shake animation for error
                const card = document.querySelector('.login-card');
                card.style.animation = 'none';
                card.offsetHeight; /* trigger reflow */
                card.style.animation = 'shake 0.5s';
                
                // Show alert
                btn.innerText = "Wrong Password ❌";
setTimeout(() => {
    btn.innerText = "Unlock Dashboard";
}, 1500);
                
                // Reset input
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        });

        // Add shake animation dynamically via JS or CSS
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
